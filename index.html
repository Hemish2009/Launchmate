<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback PNG favicons (generate with https://realfavicongenerator.net) -->
    <!-- <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" /> -->
    <!-- <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" /> -->
    <!-- <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" /> -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO / Social ── -->
    <title>launchmate · where great ideas find their people</title>
    <meta name="description" content="Post your app idea, get structured feedback, find co-founders and builders. Built for non-technical dreamers." />
    <meta name="theme-color" content="#eaeaf2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="launchmate · where great ideas find their people" />
    <meta property="og:description" content="Post your app idea, get structured feedback, find co-founders and builders." />
    <meta property="og:image"       content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="launchmate" />
    <meta name="twitter:description" content="Where great ideas find their people." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" />

    <!-- ── Base styles ── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; width: 100%; min-height: 100vh; }
      body {
        background: #060608;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
      /* Placeholder */
      ::placeholder { color: rgba(255,255,255,0.22) !important; }
      /* Selection */
      ::selection { background: rgba(255,255,255,0.15); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
